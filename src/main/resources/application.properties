spring.datasource.url=jdbc:postgresql://localhost:5432/creator_studio
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

## Object storage — map from the same shell variables as your Python .env:
## AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY are read by AWS SDK DefaultCredentialsProvider.
creator.storage.s3.enabled=${CREATOR_STORAGE_S3_ENABLED:true}
creator.storage.s3.bucket-name=${AWS_BUCKET_NAME:}
creator.storage.s3.region=${AWS_REGION:ap-northeast-1}
