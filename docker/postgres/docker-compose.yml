services:
  postgres:
    image: postgres:15
    container_name: creator-studio-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: creator_studio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - creator_studio_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  creator_studio_postgres_data: